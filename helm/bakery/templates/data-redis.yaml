# Redis — fast ephemeral state (shopping carts, with a 7-day TTL per cart).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: {{ include "bakery.namespace" . }}
  labels:
    app: redis
    {{- include "bakery.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          args:
            - redis-server
            - --maxmemory
            - 128mb
            - --maxmemory-policy
            - allkeys-lru
            - --appendonly
            - "yes"
            - --dir
            - /data
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: {{ .Values.redis.resources.requests.cpu }}
              memory: {{ .Values.redis.resources.requests.memory }}
            limits:
              cpu: {{ .Values.redis.resources.limits.cpu }}
              memory: {{ .Values.redis.resources.limits.memory }}
      volumes:
        - name: data
          emptyDir: {}
          # Swap for a PersistentVolumeClaim if carts must survive node loss;
          # AOF persistence above covers pod restarts on the same node.
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ include "bakery.namespace" . }}
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
