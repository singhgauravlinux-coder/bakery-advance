# NOTE: dbSecret.* defaults in values.yaml are for local dev only. For
# uat/cug/prod, pass real credentials with `-f a-gitignored-secrets.yaml`
# or `--set-string dbSecret.POSTGRES_PASSWORD=...`, or replace this
# template entirely with External Secrets / Sealed Secrets in production.
{{- $isRealEnv := or (eq .Values.environment "cug") (eq .Values.environment "prod") }}
{{- if and $isRealEnv (eq .Values.dbSecret.POSTGRES_PASSWORD "change-me-in-prod") }}
{{- fail (printf "Refusing to render: dbSecret.POSTGRES_PASSWORD is still the dev placeholder for environment '%s'. Pass real credentials with --set-string dbSecret.POSTGRES_PASSWORD=... or -f a gitignored secrets file." .Values.environment) }}
{{- end }}
{{- if and $isRealEnv (eq .Values.dbSecret.AUTH_TOKEN_SECRET "change-me-too-a-long-random-string") }}
{{- fail (printf "Refusing to render: dbSecret.AUTH_TOKEN_SECRET is still the dev placeholder for environment '%s'. Pass a real secret with --set-string dbSecret.AUTH_TOKEN_SECRET=... or -f a gitignored secrets file." .Values.environment) }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: bakery-db-secret
  namespace: {{ include "bakery.namespace" . }}
  labels:
    {{- include "bakery.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.dbSecret.POSTGRES_USER | quote }}
  POSTGRES_PASSWORD: {{ .Values.dbSecret.POSTGRES_PASSWORD | quote }}
  POSTGRES_DB: {{ .Values.dbSecret.POSTGRES_DB | quote }}
  DATABASE_URL: postgresql://{{ .Values.dbSecret.POSTGRES_USER }}:{{ .Values.dbSecret.POSTGRES_PASSWORD }}@postgres:5432/{{ .Values.dbSecret.POSTGRES_DB }}
  AUTH_TOKEN_SECRET: {{ .Values.dbSecret.AUTH_TOKEN_SECRET | quote }}
---
# Optional — payment-service reads these with `optional: true`, so it boots
# in mock mode if this secret is absent or a key is blank.
apiVersion: v1
kind: Secret
metadata:
  name: razorpay-credentials
  namespace: {{ include "bakery.namespace" . }}
  labels:
    {{- include "bakery.labels" . | nindent 4 }}
type: Opaque
stringData:
  keyId: {{ .Values.razorpay.keyId | quote }}
  keySecret: {{ .Values.razorpay.keySecret | quote }}
  webhookSecret: {{ .Values.razorpay.webhookSecret | quote }}
