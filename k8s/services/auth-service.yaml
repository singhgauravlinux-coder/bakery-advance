apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: bakery
  labels:
    app: auth-service
    app.kubernetes.io/part-of: crumb-and-ember
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: auth-service
          image: ghcr.io/singhgauravlinux-coder/bakery-advance/auth-service:f204e6e
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: SERVICE_NAME
              value: "auth-service"
            - name: PORT
              value: "3001"
            - name: LOG_LEVEL
              value: "info"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: bakery-db-secret
                  key: DATABASE_URL
            - name: AUTH_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: bakery-db-secret
                  key: AUTH_TOKEN_SECRET
          volumeMounts:
            - name: app-passwords
              mountPath: /run/secrets/app-passwords
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ready
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
      volumes:
        - name: app-passwords
          secret:
            secretName: app-passwords
            items:
              - key: passwords.txt
                path: passwords.txt
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: bakery
  labels:
    app: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
