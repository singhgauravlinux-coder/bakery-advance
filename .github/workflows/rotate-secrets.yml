name: Rotate platform secrets (CD)

# Every push to main derives a fresh set of credentials from
#   sha256( SECRET_MASTER_SEED : component : GITHUB_SHA )
# and applies them as the bakery-db-secret Kubernetes Secret in the target
# stage's namespace (bakery-<env>) — so passwords change on every CD run,
# and the live values are always inspectable with
# `kubectl -n bakery-<env> get secrets`. Defaults to prod; workflow_dispatch
# can target dev/uat/cug/prod explicitly.
#
# CAVEAT: helm/bakery/templates/secrets.yaml ALSO renders bakery-db-secret,
# from `dbSecret.*` in values-<env>.yaml. Whichever runs last wins. If you
# use this rotation workflow for an environment, don't also pass
# --set-string dbSecret.* on later `helm upgrade` runs for it — that would
# stomp the rotated credentials with the values-file ones on the next
# deploy. Pick one owner of bakery-db-secret per environment.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SECRET_MASTER_SEED  a long random string (e.g. `openssl rand -hex 32`);
#                       the SHA-256 derivation salts everything with this,
#                       so knowing a commit SHA alone reveals nothing.
#   KUBE_CONFIG         base64-encoded kubeconfig for the target cluster:
#                       `cat ~/.kube/config | base64 -w0`

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Which stage to rotate (bakery-<env> namespace)"
        type: choice
        options: [dev, uat, cug, prod]
        default: prod
      sync_db:
        description: "Also ALTER the live Postgres password and restart consumers"
        type: boolean
        default: true

env:
  # push-to-main rotations always target prod; workflow_dispatch can target
  # any stage via the environment input above.
  TARGET_ENV: ${{ github.event.inputs.environment || 'prod' }}

concurrency:
  group: rotate-secrets
  cancel-in-progress: false

jobs:
  rotate:
    runs-on: ubuntu-latest
    # Skip gracefully on forks / repos where the cluster secrets aren't set.
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        id: gate
        env:
          SEED: ${{ secrets.SECRET_MASTER_SEED }}
          KCFG: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "$SEED" ] || [ -z "$KCFG" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SECRET_MASTER_SEED / KUBE_CONFIG not configured — skipping rotation."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up kubeconfig
        if: steps.gate.outputs.configured == 'true'
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Generate + apply SHA-derived infrastructure secrets (rotates with this commit)
        if: steps.gate.outputs.configured == 'true'
        env:
          MASTER_SEED: ${{ secrets.SECRET_MASTER_SEED }}
          ROTATION_ID: ${{ github.sha }}
          NAMESPACE: bakery-${{ env.TARGET_ENV }}
        run: |
          chmod +x scripts/generate-secrets.sh
          SYNC="--sync-db"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.sync_db }}" = "false" ]; then
            SYNC=""
          fi
          ./scripts/generate-secrets.sh --apply $SYNC

      - name: Generate + apply SHA-hashed application passwords (updated on GitHub secret change)
        if: steps.gate.outputs.configured == 'true'
        env:
          APP_PASSWORD_AMELIE: ${{ secrets.APP_PASSWORD_AMELIE || 'baguette' }}
          APP_PASSWORD_TOMAS: ${{ secrets.APP_PASSWORD_TOMAS || 'croissant' }}
          NAMESPACE: bakery-${{ env.TARGET_ENV }}
        run: |
          chmod +x scripts/generate-app-secrets.sh
          ./scripts/generate-app-secrets.sh --apply

      - name: Show rotation audit trail (no secret values)
        if: steps.gate.outputs.configured == 'true'
        run: |
          NS="bakery-${{ env.TARGET_ENV }}"
          kubectl -n "$NS" get secrets
          echo "---"
          kubectl -n "$NS" get secret bakery-db-secret \
            -o jsonpath='{.metadata.annotations}' | python3 -m json.tool
